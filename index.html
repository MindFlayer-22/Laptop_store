<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop store</title>
    <link rel="icon" href="assets/logo.webp">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="top-bar">
            <div class="logo">
                <img src="assets/predator-logo-removebg-preview.png" alt="logo">
            </div>
            <nav class="nav-bar">
                <ul>
                    <li>Home</li>
                    <li>Laptops</li>
                    <li>Offers</li>
                    <li>Reviews</li>
                    <li>Articles</li>
                    <li>Gallery</li>
                    <li>Enquiry</li>
                </ul>
            </nav>
            <div class="language-dropdown">
                <select name="language" id="lang-select">
                    <option value="en">EN</option>
                    <option value="es">ES</option>
                    <option value="fr">FR</option>
                    <option value="de">DE</option>
                </select>
            </div>
        </div>
        <img src="https://imgs.search.brave.com/jhlX110PQrJjRyxtEK2LM1ECjbROOesHa40SLQ9KDBs/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuYWNlci5jb20v/aXMvaW1hZ2UvYWNl/ci9wcmVkYXRvci1o/ZWxpb3MtbWFpbi1i/YW5uZXIoRFQpPyRp/bWFnZS0yNTYwdyQ" alt="advertisement" id="add">
    
        <div class="filter-container">
            <ul class="filter-tabs">
                <li class="tab active">All</li>
                <li class="tab">For AI / Copilot PC</li>
                <li class="tab">For Students</li>
                <li class="tab">For Creators</li>
                <li class="tab">For Gaming</li>
                <li class="tab">Accessories</li>
            </ul>
        </div>

        <main class="product-section">
            <div class="product-grid">
                
                <div class="product-card">
                    <div class="product-img">
                        <img src="https://images.unsplash.com/photo-1603302576837-37561b2e2302?q=80&w=500" alt="Laptop">
                    </div>
                    <h3 class="product-title">ASUS Zenbook 14 (UX3405)</h3>
                    <div class="card-buttons">
                        <button class="btn-enquire">Enquire Now</button>
                        <button class="btn-know">Know More</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="https://images.unsplash.com/photo-1593642632823-8f785ba67e45?q=80&w=500" alt="Laptop">
                    </div>
                    <h3 class="product-title">ROG Strix SCAR 16 (2025)</h3>
                    <div class="card-buttons">
                        <button class="btn-enquire">Enquire Now</button>
                        <button class="btn-know">Know More</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?q=80&w=500" alt="Laptop">
                    </div>
                    <h3 class="product-title">ASUS ProArt PX13 (HN7306)</h3>
                    <div class="card-buttons">
                        <button class="btn-enquire">Enquire Now</button>
                        <button class="btn-know">Know More</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?q=80&w=500" alt="Laptop">
                    </div>
                    <h3 class="product-title">ASUS Vivobook 16</h3>
                    <div class="card-buttons">
                        <button class="btn-enquire">Enquire Now</button>
                        <button class="btn-know">Know More</button>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
