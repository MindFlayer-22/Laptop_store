<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop store</title>
    <link rel="icon" href="assets/logo.webp">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="top-bar">
            <div class="logo">
                <img src="assets/predator-logo-removebg-preview.png" alt="logo">
            </div>
            <nav class="nav-bar">
                <ul>
                    <li>Home</li>
                    <li>Laptops</li>
                    <li>Offers</li>
                    <li>Reviews</li>
                    <li>Articles</li>
                    <li>Gallery</li>
                    <li>Enquiry</li>
                </ul>
            </nav>
            <div class="language-dropdown">
                <select name="language" id="lang-select">
                    <option value="en">EN</option>
                    <option value="es">ES</option>
                    <option value="fr">FR</option>
                    <option value="de">DE</option>
                </select>
            </div>
        </div>
        <img src="https://imgs.search.brave.com/jhlX110PQrJjRyxtEK2LM1ECjbROOesHa40SLQ9KDBs/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuYWNlci5jb20v/aXMvaW1hZ2UvYWNl/ci9wcmVkYXRvci1o/ZWxpb3MtbWFpbi1i/YW5uZXIoRFQpPyRp/bWFnZS0yNTYwdyQ" alt="advertisement" id="add">
    
        <div class="filter-container">
            <ul class="filter-tabs">
                <li class="tab active">All</li>
                <li class="tab">For AI / Copilot PC</li>
                <li class="tab">For Students</li>
                <li class="tab">For Creators</li>
                <li class="tab">For Gaming</li>
                <li class="tab">Accessories</li>
            </ul>
        </div>

        <main class="product-section">
            <div id="product-container" class="product-grid"> 

            </div>
        </main>
    </div>
    
    <div id="compare-bar" style="position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 15px 30px; border-radius: 30px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: bottom 0.3s ease; z-index: 999;">
        <span id="compare-count">0 items selected to compare</span>
        <button id="open-compare-btn" style="background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold;">View Comparison</button>
    </div>

    <div id="compare-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px);">
        <div style="background: white; color: #333; width: 90%; max-width: 900px; max-height: 85vh; border-radius: 12px; padding: 30px; position: relative; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
            
            <button id="close-compare-btn" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 28px; cursor: pointer; color: #666;">&times;</button>
            
            <h2 style="margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Product Comparison</h2>
            
            <div id="compare-grid" style="display: flex; gap: 20px; justify-content: flex-start; overflow-x: auto; padding-bottom: 15px;">
                </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
