<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop store</title>
    <link rel="icon" href="assets/logo.webp">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="top-bar">
            <div class="logo">
                <img src="assets/predator-logo-removebg-preview.png" alt="logo">
            </div>
            <nav class="nav-bar">
                <ul>
                    <li>Home</li>
                    <li>Laptops</li>
                    <li>Offers</li>
                    <li>Reviews</li>
                    <li>Articles</li>
                    <li>Gallery</li>
                    <li>Enquiry</li>
                </ul>
            </nav>
            <div class="language-dropdown">
                <select name="language" id="lang-select">
                    <option value="en">EN</option>
                    <option value="es">ES</option>
                    <option value="fr">FR</option>
                    <option value="de">DE</option>
                </select>
            </div>
        </div>
        
        <img src="https://imgs.search.brave.com/jhlX110PQrJjRyxtEK2LM1ECjbROOesHa40SLQ9KDBs/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuYWNlci5jb20v/aXMvaW1hZ2UvYWNl/ci9wcmVkYXRvci1o/ZWxpb3MtbWFpbi1i/YW5uZXIoRFQpPyRp/bWFnZS0yNTYwdyQ" alt="advertisement" id="add">
    
        <div class="filter-container">
            <ul class="filter-tabs">
                <li class="tab active">All</li>
                <li class="tab">For AI / Copilot PC</li>
                <li class="tab">For Students</li>
                <li class="tab">For Creators</li>
                <li class="tab">For Gaming</li>
                <li class="tab">Accessories</li>
            </ul>
        </div>

        <main class="product-section">
            <div id="product-container" class="product-grid"> 

            </div>
        </main>
    </div>
    
    <div id="compare-bar" style="position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #15151a; color: white; padding: 15px 30px; border-radius: 30px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: bottom 0.3s ease; z-index: 999; border: 1px solid #2a2a35;">
        <span id="compare-count">0 items selected to compare</span>
        <button id="open-compare-btn" style="background: #00e5ff; color: #0a0a0c; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold;">View Comparison</button>
    </div>

    <div id="compare-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px);">
        <div style="background: #15151a; color: #f8fafc; width: 90%; max-width: 900px; max-height: 85vh; border-radius: 12px; padding: 30px; position: relative; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #2a2a35;">
            
            <button id="close-compare-btn" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 28px; cursor: pointer; color: #888890;">&times;</button>
            
            <h2 style="margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #2a2a35; padding-bottom: 10px;">Product Comparison</h2>
            
            <div id="compare-grid" style="display: flex; gap: 20px; justify-content: flex-start; overflow-x: auto; padding-bottom: 15px;">
            </div>
        </div>
    </div>

    <button id="floating-cart-btn" style="position: fixed; top: 20px; right: 20px; background: #00e5ff; color: #0a0a0c; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4); z-index: 1000; transition: transform 0.2s;">
        🛒 Cart (<span id="cart-count">0</span>)
    </button>

    <div id="cart-panel" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #15151a; box-shadow: -5px 0 25px rgba(0,0,0,0.8); z-index: 1001; transition: right 0.3s ease; display: flex; flex-direction: column; border-left: 1px solid #222;">
        
        <div style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; color: #f8fafc;">Your Cart</h2>
            <button id="close-cart-btn" style="background: none; border: none; color: #888890; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <div id="cart-items-container" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;">
        </div>

        <div style="padding: 20px; border-top: 1px solid #222; background: #0a0a0c;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; font-weight: bold;">
                <span>Total:</span>
                <span id="cart-total-price" style="color: #00e5ff;">$0</span>
            </div>
            <button style="width: 100%; padding: 15px; background: #00e5ff; color: #0a0a0c; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;">Checkout Now</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
